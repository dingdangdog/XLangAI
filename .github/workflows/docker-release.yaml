name: Docker

on:
  push:
    tags:
      - v*.*.*

jobs:
  docker_build:
    environment: docker_hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 确保能获取到 tags 用于生成版本号

      - name: Get version
        id: get_version
        # 提取语义化版本号，例如从 v5.1.3 提取出 5.1.3
        run: |
          VERSION=$(git describe --tags --always --match 'v*' | sed -n 's|^v\([0-9]*\.[0-9]*\.[0-9]*\)\(-.*\)\{0,1\}|\1|p')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64 # 明确指定需要模拟的平台

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dingdangdog/xlangai:${{ steps.get_version.outputs.VERSION }}
            dingdangdog/xlangai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
