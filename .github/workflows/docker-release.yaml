name: Docker Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  docker_build:
    name: Build and push image
    environment: docker_hub
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.get_version.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: get_version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH, got: $TAG"
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dingdangdog/xlangai:${{ steps.get_version.outputs.TAG }}
            dingdangdog/xlangai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github_release:
    name: Publish GitHub Release
    needs: docker_build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.docker_build.outputs.tag }}
          name: ${{ needs.docker_build.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
