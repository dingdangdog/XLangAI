# XlangAI Unified Deployment: Single Image Exposure of Operations Backend 3312 and Go API 8080

services:
  # 可选：取消注释以启用 Redis 分布式缓存（多实例部署推荐）
  # redis:
  #   image: redis:7-alpine
  #   container_name: xlangai-redis
  #   restart: unless-stopped
  #   volumes:
  #     - ./data/redis:/data

  xlangai:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dingdangdog/xlangai:latest
    container_name: xlangai
    restart: unless-stopped
    ports:
      - "3312:3312"
      - "8080:8080"
    environment:
      # Manager & Server Shared Database
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/xlangai?schema=public

      # Nuxt runtimeConfig — Manager Private
      NUXT_ENV: "development"
      NUXT_MANAGER_AUTO_SEED: "true"
      NUXT_MANAGER_AUTH_SECRET: change-me-in-production
      NUXT_MANAGER_ADMIN_USERNAME: admin
      NUXT_MANAGER_ADMIN_PASSWORD: "Change-me-in-production"
      NUXT_MANAGER_ADMIN_NICKNAME: Adminer
      NUXT_MANAGER_ADMIN_SEED: "true"
      # NUXT_MANAGER_TEST_ACCOUNT_SEED: "false"

      # Go API
      JWT_SECRET: change-me-in-production
      XLANGAI_FFMPEG_PATH: ffmpeg
      GIN_MODE: "release"
      # 可选 Redis（启用上方 redis 服务后取消注释）
      # REDIS_URL: redis://redis:6379
      # XLANGAI_VERBOSE_LOGS: ${XLANGAI_VERBOSE_LOGS:-0}
    volumes:
      - ./data/storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # depends_on:
    #   - redis
